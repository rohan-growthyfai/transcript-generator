<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Transcript Generator</title>
<style>
  html,body{margin:0;height:100%;background:#0b1020;color:#e7ecff;font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:560px;text-align:center;padding:28px 24px;border:1px solid #23305e;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));box-shadow:0 10px 30px rgba(0,0,0,.35)}
  h1{font-size:22px;margin:0 0 6px;letter-spacing:-.01em}
  p{color:#8892b0;margin:0 0 14px}
  a{color:#7c8cff}
  .err{color:#ff6b81}
  .pulse{display:inline-block;width:10px;height:10px;border-radius:50%;background:#34d399;margin-right:8px;animation:p 1.4s ease-in-out infinite}
  @keyframes p{50%{opacity:.35}}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1><span class="pulse"></span>Transcript Generator</h1>
<p id="msg">Connecting to the latest server…</p>
<p id="link"></p>
<p style="font-size:12px;color:#5e6a8c">If this page doesn't redirect, the host laptop may be offline. The service self-recovers as soon as the laptop is on and online.</p>
</div>
</div>
<script>
  // Pull the current tunnel URL from this same Pages site (kept up to date by the host).
  // Fallback: read from the GitHub raw URL.
  const SOURCES = [
    './current-url.txt',
    'https://raw.githubusercontent.com/rohan-growthyfai/transcript-generator/main/docs/current-url.txt',
  ];
  (async () => {
    for (const src of SOURCES) {
      try {
        const r = await fetch(src + '?t=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) continue;
        const url = (await r.text()).trim();
        if (/^https:\/\/[a-z0-9-]+\.trycloudflare\.com\/?$/i.test(url)) {
          document.getElementById('msg').textContent = 'Redirecting…';
          document.getElementById('link').innerHTML = 'If you are not redirected, <a href="' + url + '">click here</a>.';
          location.replace(url);
          return;
        }
      } catch (_) {}
    }
    document.getElementById('msg').innerHTML = '<span class="err">The host is currently offline.</span>';
    document.getElementById('link').textContent = 'Try again in a minute. Service auto-recovers.';
  })();
</script>
</body>
</html>
