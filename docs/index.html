<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Transcript Generator</title>
<style>
  html,body{margin:0;height:100%;background:#0b1020;color:#e7ecff;font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:560px;width:100%;text-align:center;padding:28px 24px;border:1px solid #23305e;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));box-shadow:0 10px 30px rgba(0,0,0,.35)}
  h1{font-size:22px;margin:0 0 10px;letter-spacing:-.01em}
  p{color:#8892b0;margin:0 0 14px}
  a.btn{display:inline-block;margin-top:8px;padding:10px 16px;border-radius:10px;background:linear-gradient(135deg,#7c8cff,#5ce1e6);color:#0b1020;text-decoration:none;font-weight:700}
  .small{font-size:12px;color:#5e6a8c;margin-top:18px}
  .pulse{display:inline-block;width:10px;height:10px;border-radius:50%;background:#34d399;margin-right:8px;animation:p 1.4s ease-in-out infinite;vertical-align:middle}
  @keyframes p{50%{opacity:.35}}
  .err{color:#ff6b81}
  code{background:#121a3c;padding:2px 6px;border-radius:6px;border:1px solid #23305e}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1><span class="pulse" id="pulse"></span><span id="title">Transcript Generator</span></h1>
<p id="msg">Connecting to the latest server…</p>
<p id="link"></p>
<p class="small" id="hint">If this takes a while, the server is starting a fresh secure tunnel — usually under a minute.</p>
</div>
</div>
<script>
  // Sources for the latest tunnel URL, in order of freshness.
  // GH Pages own path (no CDN lag) → jsDelivr (fast invalidation) → raw GitHub (cached ~5min, last resort).
  const REPO = 'rohan-growthyfai/transcript-generator';
  const URL_SOURCES = [
    () => './current-url.txt?t=' + Date.now(),
    () => 'https://cdn.jsdelivr.net/gh/' + REPO + '@main/docs/current-url.txt?t=' + Date.now(),
    () => 'https://raw.githubusercontent.com/' + REPO + '/main/docs/current-url.txt?t=' + Date.now(),
  ];

  const $ = (id) => document.getElementById(id);
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  const isUrl = (u) => /^https:\/\/[a-z0-9-]+\.trycloudflare\.com\/?$/i.test((u || '').trim());

  async function fetchUrl() {
    for (const s of URL_SOURCES) {
      try {
        const r = await fetch(s(), { cache: 'no-store' });
        if (!r.ok) continue;
        const txt = (await r.text()).trim();
        if (isUrl(txt)) return txt.replace(/\/$/, '');
      } catch (_) {}
    }
    return null;
  }

  // Probe the URL: hit /api/health. CORS is permitted by the server; if not, we still get a response.
  async function probe(url, timeoutMs = 6000) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      const r = await fetch(url + '/api/health', { cache: 'no-store', signal: ctrl.signal });
      clearTimeout(t);
      return r.ok;
    } catch (_) {
      return false;
    }
  }

  let lastUrl = null;
  let attempts = 0;

  async function tick() {
    attempts += 1;
    const url = await fetchUrl();
    if (!url) {
      $('msg').innerHTML = '<span class="err">The host laptop seems to be offline.</span>';
      $('hint').textContent = 'The service auto-recovers when the laptop comes online. This page also auto-refreshes.';
      return scheduleNext(15000);
    }
    if (url !== lastUrl) {
      lastUrl = url;
      $('link').innerHTML = 'Latest: <code>' + url + '</code>';
    }
    const ok = await probe(url);
    if (ok) {
      $('msg').textContent = 'Connected. Redirecting…';
      $('link').innerHTML = 'If you are not redirected, <a class="btn" href="' + url + '">Open Transcript Generator</a>';
      // Replace so the back button doesn't trap us here
      location.replace(url);
      return;
    }
    // Not ready yet — could be DNS still propagating after a fresh tunnel
    $('msg').innerHTML = 'Securing fresh tunnel… (' + attempts + ')';
    $('hint').innerHTML = 'New trycloudflare URLs sometimes need ~30–60s to propagate. <a href="' + url + '">Try opening directly</a>.';
    scheduleNext(attempts < 8 ? 5000 : 12000);
  }

  function scheduleNext(ms) { setTimeout(tick, ms); }
  tick();
</script>
</body>
</html>
